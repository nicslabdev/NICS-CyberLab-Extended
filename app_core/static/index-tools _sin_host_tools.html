<!DOCTYPE html>
<html lang="es">



<head>
    <meta charset="UTF-8">
    <title>Gestor de Herramientas por Instancia</title>

   
    <script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/js/all.min.js"></script>
 
  


    <style>
        #cy {
            height: 600px;
            width: 100%;
        }
        .btn-uninstall {
        transition: all 0.3s ease;
        border: 1px solid rgba(249, 115, 22, 0.3);
        }
        .btn-uninstall:hover {
            background-color: rgba(249, 115, 22, 0.1);
            border-color: rgba(249, 115, 22, 1);
            box-shadow: 0 0 10px rgba(249, 115, 22, 0.2);
        }
    </style>
</head>



<body class="bg-gray-900 text-white">

<div class="flex min-h-screen p-6 space-x-6">

    <!-- PANEL IZQUIERDO -->
    <div class="w-1/3 bg-gray-800 rounded-xl p-5">
        <h1 class="text-2xl font-bold mb-4">
            <i class="fas fa-server"></i> Instancias Disponibles
        </h1>
        <div id="instance-list" class="space-y-3"></div>
    </div>

    <!-- ESCENARIO -->
    <div class="flex-1 bg-gray-800 rounded-xl p-5">
        <h1 class="text-xl font-bold mb-3">
            <i class="fas fa-network-wired"></i> Escenario Actual
        </h1>
        <div id="cy" class="bg-gray-700 rounded-lg shadow-inner"></div>
    </div>

    <!-- PANEL DERECHO -->
    <div class="w-1/3 bg-gray-800 rounded-xl p-5">
        <h1 class="text-2xl font-bold mb-4 text-center">
            <i class="fas fa-tools"></i> Herramientas de Instancia
        </h1>

        <div id="selected-instance-info" class="p-4 bg-gray-700 rounded-lg mb-5 hidden">
            <h2 class="text-lg font-bold mb-2">Instancia seleccionada:</h2>
            <p class="text-primary" id="instance-name"></p>
            <p class="text-sm text-gray-400" id="instance-ip"></p>
        </div>

        <h2 class="text-lg font-bold mb-2">Herramientas Instaladas</h2>
        <div id="installed-tools" class="bg-gray-700 rounded-lg p-4 space-y-2 h-40 overflow-y-auto"></div>

        <h2 class="text-lg font-bold mt-6 mb-2">Añadir Herramienta</h2>
        <select id="available-tools"
                class="w-full bg-gray-900 border border-gray-700 p-2 rounded-lg text-white">
            <option value="">Selecciona herramienta...</option>
            <option value="wazuh">Wazuh</option>
            <option value="wazuh_agent">Wazuh-Agent</option>
            <option value="suricata">Suricata</option>
            <option value="snort">Snort</option>
            <option value="nmap">Nmap</option>
            <option value="caldera">MITRE Caldera</option>
             <option value="caldera_agent">MITRE Caldera Agent</option>
            <option value="tcpdump">TCPDump</option>
            <option value="zeek">Zeek</option> 
            <option value="caldera_ot_plugins">Caldera Ot Plugins</option>
           
        </select>

        <button onclick="addTool()" 
                class="w-full mt-3 bg-green-600 hover:bg-green-500 py-2 rounded-lg font-bold">
            <i class="fas fa-plus"></i> Añadir Herramienta
        </button>

        <h2 class="text-lg font-bold mt-6 mb-2">Terminal</h2>
        <button onclick="loadToolsConfig()"
        class="w-full mt-3 bg-blue-600 hover:bg-blue-500 py-2 rounded-lg font-bold">
       <i class="fas fa-cogs"></i> Leer configuración de herramientas
        </button>
<button onclick="installTools()"
        class="w-full mt-3 bg-green-600 hover:bg-green-500 py-2 rounded-lg font-bold">
    <i class="fas fa-play"></i> Ejecutar instalación de herramientas
</button>

    <div id="tools-terminal" 
     class="bg-black text-green-500 rounded-lg p-3 h-64 overflow-y-auto font-mono text-xs border border-gray-700">
     > Sistema listo para desinstalación...
</div>
</div>






<!-- SCRIPT PRINCIPAL -->
<script src="js/index-tools.js"></script>

</body>
</html>
