<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>NICS CyberLab | Forensic Readiness Module</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-slate-100 min-h-screen p-8">

<h1 class="text-3xl font-bold text-sky-400 mb-6">
  Forensic Readiness & Guided Analysis
</h1>

<div class="grid grid-cols-3 gap-6">

  <!-- NODOS -->
  <section class="bg-slate-900 border border-slate-800 rounded-xl p-5">
    <h2 class="text-xl font-semibold mb-3">Instancias</h2>
    <div id="node-list" class="space-y-2"></div>
  </section>

  <!-- CAPACIDADES -->
  <section class="bg-slate-900 border border-slate-800 rounded-xl p-5">
    <h2 class="text-xl font-semibold mb-3">Capacidades Forenses</h2>
    <div id="capabilities" class="space-y-2 text-sm"></div>
  </section>

  <!-- OPERACIONES -->
  <section class="bg-slate-900 border border-slate-800 rounded-xl p-5">
    <h2 class="text-xl font-semibold mb-3">Acciones Guiadas</h2>
    <div id="actions" class="space-y-3"></div>
  </section>

</div>

<!-- LOG -->
<section class="bg-black border border-slate-800 rounded-xl p-4 mt-6">
  <h3 class="text-emerald-400 font-semibold mb-2">Forensic Log</h3>
  <div id="forensic-log"
       class="font-mono text-xs text-emerald-300 space-y-1 max-h-48 overflow-y-auto"></div>
</section>

<script src="js/forensic.js"></script>
</body>
</html>
