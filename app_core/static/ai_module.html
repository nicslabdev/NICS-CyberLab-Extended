<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>NICS CyberLab | AI Module</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-slate-100 min-h-screen">

<!-- OVERLAY BLOQUEANTE -->
<div id="overlay" class="hidden fixed inset-0 bg-black/70 z-50 flex items-center justify-center">
  <div class="bg-slate-900 border border-slate-800 rounded-xl p-6 w-[520px] shadow-xl">
    <div class="flex items-center gap-3 mb-3">
      <div class="w-3 h-3 rounded-full bg-sky-400 animate-pulse"></div>
      <div>
        <div class="font-semibold text-sky-400">Deploying AI module</div>
        <div id="overlay-status" class="text-xs text-slate-400">
         Initializing…
        </div>
      </div>
    </div>

    <!-- PROGRESS BAR -->
    <div class="w-full h-2 bg-slate-800 rounded-full overflow-hidden mb-4">
      <div id="progress"
           class="h-2 w-0 bg-emerald-500 transition-all duration-500"></div>
    </div>

    <!-- TERMINAL DE LOGS -->
    <div class="bg-black/80 border border-slate-700 rounded-lg p-3">
      <div class="text-xs text-slate-400 mb-1">
        Deployment logs (live)
      </div>
      <pre id="ai-log-terminal"
           class="text-xs text-emerald-300 font-mono h-48 overflow-auto whitespace-pre-wrap">
[waiting for logs...]
      </pre>
    </div>
  </div>
</div>

<!-- CONTENIDO -->
<main class="max-w-xl mx-auto mt-32 text-center space-y-6">
  <h1 class="text-2xl font-bold text-sky-400">AI Module</h1>

  <div id="status" class="text-slate-300">
    Checking status…
  </div>

  <!-- BOTÓN DE CONSENTIMIENTO -->
  <button id="deployBtn"
    class="hidden px-6 py-3 rounded-lg bg-emerald-600 hover:bg-emerald-500 font-semibold shadow">
    Deploy AI module
  </button>
</main>

<script src="js/ai_module.js"></script>
</body>
</html>
