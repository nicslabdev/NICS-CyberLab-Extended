    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
       
        body {
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #00ff88;
            margin: 0;
            overflow-y: auto;   
            overflow-x: hidden;
        }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        #cy {
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, rgba(10,14,39,0.8) 0%, rgba(10,14,39,0.95) 100%),
                        repeating-linear-gradient(0deg, rgba(0,255,136,0.03) 0px, transparent 1px, transparent 40px, rgba(0,255,136,0.03) 41px),
                        repeating-linear-gradient(90deg, rgba(0,255,136,0.03) 0px, transparent 1px, transparent 40px, rgba(0,255,136,0.03) 41px);
        }
        .hud-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            background:
                linear-gradient(to right, rgba(0,255,136,0.1) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0,255,136,0.1) 1px, transparent 1px);
            background-size: 60px 60px;
        }
        .targeting-hud {
            position: absolute;
            display: none;
            pointer-events: none;
            z-index: 1000;
            transform: translate(-50%, -50%);
        }
        .targeting-hud.active {
            display: block;
            animation: targetLock 0.3s ease-out;
        }
        @keyframes targetLock {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
        .reticle {
            width: 200px;
            height: 200px;
            border: 2px solid #00ff88;
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 30px rgba(0,255,136,0.4), inset 0 0 30px rgba(0,255,136,0.2);
        }
        .reticle::before, .reticle::after {
            content: '';
            position: absolute;
            background: #00ff88;
        }
        .reticle::before { width: 40px; height: 2px; left: 50%; top: 50%; transform: translate(-50%, -50%); }
        .reticle::after { width: 2px; height: 40px; left: 50%; top: 50%; transform: translate(-50%, -50%); }
        .context-menu {
            position: absolute;
            display: none;
            background: rgba(10, 14, 39, 0.98);
            border: 2px solid #00ff88;
            border-radius: 12px;
            padding: 8px;
            min-width: 280px;
            box-shadow: 0 0 40px rgba(0,255,136,0.6);
            z-index: 10000;
            backdrop-filter: blur(10px);
        }
        .context-menu.active { display: block; }
        .context-menu-section { margin-bottom: 12px; }
        .context-menu-title {
            font-size: 9px;
            font-weight: 900;
            letter-spacing: 2px;
            color: #00ff88;
            margin-bottom: 6px;
            padding-left: 8px;
            border-left: 3px solid #00ff88;
        }
        .context-menu-item {
            padding: 10px 12px;
            cursor: pointer;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,255,136,0.05);
            border: 1px solid rgba(0,255,136,0.2);
            margin-bottom: 4px;
        }
        .context-menu-item:hover {
            background: rgba(0,255,136,0.2);
            border-color: #00ff88;
            transform: translateX(4px);
        }
        #combat-log::-webkit-scrollbar { width: 6px; }
        #combat-log::-webkit-scrollbar-track { background: rgba(0,255,136,0.1); }
        #combat-log::-webkit-scrollbar-thumb { background: #00ff88; border-radius: 10px; }
        .hud-corner {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 2px solid #00ff88;
            z-index: 10;
        }
        .hud-corner.tl { top: 20px; left: 20px; border-right: none; border-bottom: none; }
        .hud-corner.tr { top: 20px; right: 20px; border-left: none; border-bottom: none; }
        .hud-corner.bl { bottom: 20px; left: 20px; border-right: none; border-top: none; }
        .hud-corner.br { bottom: 20px; right: 20px; border-left: none; border-top: none; }
        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00ff88, transparent);
            animation: scanMove 4s linear infinite;
            opacity: 0.3;
            z-index: 5;
        }
        @keyframes scanMove { 0% { top: 0; } 100% { top: 100%; } }
        .status-indicator { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .status-online { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
        .status-offline { background: #ff3366; box-shadow: 0 0 8px #ff3366; }
        .status-unknown { background: #ffaa00; box-shadow: 0 0 8px #ffaa00; }

    <script>
        let cy;
        let autoRefresh = false;
        let autoRefreshInterval;
        let connectionMode = false;
        let selectedNodes = [];

        const API_BASE = "http://127.0.0.1:5001/api";

        const ROLE_CONFIG = {
            plc:       { icon: "fa-microchip", color: "#00aaff", label: "PLC CONTROLLER" },
            scada:     { icon: "fa-desktop",   color: "#ff6600", label: "SCADA SYSTEM" },
            attacker:  { icon: "fa-user-ninja",color: "#ff3366", label: "ATTACKER NODE" },
            monitor:   { icon: "fa-radar",     color: "#00ff88", label: "MONITOR STATION" },
            victim:    { icon: "fa-server",    color: "#ffaa00", label: "VICTIM HOST" },
            unknown:   { icon: "fa-question-circle", color: "#888888", label: "UNKNOWN" }
        };

        document.addEventListener("DOMContentLoaded", () => {
            cy = cytoscape({
                container: document.getElementById("cy"),
                style: [
                    {
                        selector: "node",
                        style: {
                            'label': 'data(name)',
                            'text-valign': 'bottom',
                            'text-margin-y': 10,
                            'color': '#00ff88',
                            'font-family': 'Orbitron',
                            'font-size': '10px',
                            'background-color': d => ROLE_CONFIG[d.data('role')]?.color || '#888888',
                            'border-width': 2,
                            'border-color': '#00ff88',
                            'width': 40, 'height': 40
                        }
                    },
                    {
                        selector: "edge",
                        style: {
                            'width': 2,
                            'curve-style': 'bezier',
                            'target-arrow-shape': 'triangle',
                            'opacity': 0.8
                        }
                    },
                    // Estilos por tipo de enlace
                    { selector: 'edge[type="network"]', style: { 'line-color': '#00ff88', 'target-arrow-color': '#00ff88' } },
                    { selector: 'edge[type="modbus"]',  style: { 'line-color': '#ffaa00', 'target-arrow-color': '#ffaa00', 'width': 3 } },
                    { selector: 'edge[type="attack"]',  style: { 'line-color': '#ff3366', 'target-arrow-color': '#ff3366', 'line-style': 'dashed' } },
                    { selector: 'edge[type="monitor"]', style: { 'line-color': '#00aaff', 'target-arrow-color': '#00aaff' } },
                    { selector: 'edge[type="c2"]',      style: { 'line-color': '#ff6600', 'target-arrow-color': '#ff6600' } },
                    { selector: 'edge[type="manual"]',  style: { 'line-color': '#ffaa00', 'target-arrow-color': '#ffaa00', 'opacity': 1 } },
                    { selector: ':selected', style: { 'border-width': 4, 'border-color': '#ffaa00' } }
                ],
                layout: { name: "preset" }
            });

            cy.on("tap", "node", e => renderTargetDetails(e.target));
            cy.on("mouseover", "node", handleNodeHover);
            cy.on("mouseout", "node", () => document.getElementById("targeting-hud").classList.remove("active"));
            cy.on("cxttap", "node", handleRightClick);

            // Hover en enlaces → info en log
            cy.on("mouseover", "edge", e => {
                const edge = e.target;
                const s = edge.source().data("name") || edge.source().id();
                const t = edge.target().data("name") || edge.target().id();
                const type = edge.data("type") || "network";
                logCombat("EDGE", `${s} → ${t}  (${type})`);
            });

            // Modo conexión: selección de nodos
        cy.on("select", "node", evt => {
    if (!connectionMode) return;

    selectedNodes.push(evt.target);
    logCombat("SELECT", `Nodo seleccionado: ${evt.target.id()}`);

    if (selectedNodes.length === 2) {
        const a = selectedNodes[0];
        const b = selectedNodes[1];

        cy.add({
            group: "edges",
            data: {
                id: `manual-${Date.now()}`,
                source: a.id(),
                target: b.id(),
                type: "manual"
            }
        });

        logCombat("EDGE", `Enlace manual: ${a.id()} → ${b.id()}`);
        selectedNodes = [];
        connectionMode = false;
        document.getElementById("conn-status").textContent = "OFF";
        updateStats();
    }
});

            document.addEventListener("click", () => {
                document.getElementById("context-menu").classList.remove("active");
            });

            refreshBattlefield();
        });

 async function refreshBattlefield() {
    logCombat("SCAN", "Escaneo táctico iniciado");

    try {
        const res = await fetch(`${API_BASE}/hud/instances`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();
        cy.elements().remove();

        const instances = data.instances || [];
        const edges = data.edges || [];

        // =========================
        // NODOS
        // =========================
        instances.forEach((inst, i) => {
            const pos = inst.position || {
                x: 500 + Math.cos((i / instances.length) * 2 * Math.PI) * 250,
                y: 400 + Math.sin((i / instances.length) * 2 * Math.PI) * 250
            };

            cy.add({
                group: "nodes",
                data: {
                    id: inst.id,          // ✅ ID REAL
                    name: inst.name,
                    role: inst.role,
                    status: inst.status,
                    ip: inst.ip,
                    os: inst.os,
                    allowed_ports: inst.allowed_ports,
                    strategies: inst.strategies
                },
                position: pos
            });
        });

        // =========================
        // EDGES (ÚNICA FUENTE)
        // =========================
        if (Array.isArray(edges) && edges.length > 0) {
            cy.add(edges.map((e, i) => ({
                group: "edges",
                data: {
                    id: e.id || `edge-${i}-${e.source}-${e.target}`,
                    source: e.source,
                    target: e.target,
                    type: e.type || "network"
                }
            })));
            logCombat("EDGES", `Cargados ${edges.length} enlaces`);
        } else {
            logCombat("WARN", "Sin enlaces recibidos");
        }

        cy.fit(null, 60);
        updateStats();
        debugLinks();

        logCombat("SUCCESS", "HUD sincronizado");

    } catch (err) {
        logCombat("ERROR", err.message);
    }
}

function debugLinks() {
    console.groupCollapsed("HUD LINKS");
    cy.edges().forEach(e => {
        console.log(
            e.id(),
            e.source().id(),
            "→",
            e.target().id(),
            `[${e.data("type")}]`
        );
    });
    console.log("Total:", cy.edges().length);
    console.groupEnd();
}




function toggleConnectionMode() {
    connectionMode = !connectionMode;
    selectedNodes = [];

    document.getElementById("conn-status").textContent =
        connectionMode ? "ON" : "OFF";

    logCombat(
        "MODE",
        connectionMode
            ? "Modo conexión activo (selecciona 2 nodos)"
            : "Modo conexión desactivado"
    );
}



        function handleNodeHover(e) {
            const node = e.target;
            const pos = node.renderedPosition();
            const hud = document.getElementById("targeting-hud");
            const data = node.data();
           
            hud.style.left = pos.x + "px";
            hud.style.top = pos.y + "px";
            hud.classList.add("active");
           
            document.getElementById("hover-name").textContent = data.name;
            document.getElementById("hover-ip").textContent = data.ip || "N/A";
            document.getElementById("hover-role").textContent = (data.role || "UNKNOWN").toUpperCase();
            document.getElementById("hover-status").textContent = data.status || "-";
        }

        function handleRightClick(e) {
            e.preventDefault();
            const menu = document.getElementById("context-menu");
            const pos = e.renderedPosition;
            menu.style.left = pos.x + "px";
            menu.style.top = pos.y + "px";
            menu.classList.add("active");

            const data = e.target.data();
            const strategies = data.strategies || { attack: [], defense: [], prevention: [] };
           
            populateContextActions("attack-actions", strategies.attack || [], data.id);
            populateContextActions("defense-actions", strategies.defense || [], data.id);
            populateContextActions("prevention-actions", strategies.prevention || [], data.id);
        }

        function populateContextActions(id, actions, targetId) {
            const container = document.getElementById(id);
            container.innerHTML = actions.length ? "" : '<div class="text-[9px] opacity-40 p-2">No disponible</div>';
            actions.forEach(a => {
                const div = document.createElement("div");
                div.className = `context-menu-item ${id.split('-')[0]}`;
                div.innerHTML = `<i class="fas fa-terminal"></i> ${a}`;
                div.onclick = () => executeAction(targetId, a, a);
                container.appendChild(div);
            });
        }

        async function executeAction(targetId, actionId, label) {
            logCombat("ACTION", `Ejecutando ${label} en ${targetId}...`);
            try {
                const res = await fetch(`${API_BASE}/hud/action`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ target_id: targetId, action: actionId })
                });
                const result = await res.json();
                logCombat("RESULT", result.message || "Operación confirmada.");
            } catch (e) {
                logCombat("ERROR", "Fallo en la ejecución.");
            }
        }





async function runAttack(attackerIp, targetIp, scriptName) {
    terminalWrite(`ESTABLISHING SECURE SSH TUNNEL...`, 'text-sky-300 animate-pulse');
    
    try {
        // Nota: El backend ahora buscará la máquina 'attack...' automáticamente, 
        // pero enviamos attackerIp por si tu backend lo requiere como filtro inicial.
        const response = await fetch(`${API_BASE}/hud/attack/launch?ip=${attackerIp}&target=${targetIp}&script=${scriptName}`);
        
        if (!response.ok) {
            throw new Error(`ENLACE FALLIDO: Status ${response.status}`);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
            const { value, done } = await reader.read();
            if (done) break;

            const chunk = decoder.decode(value, { stream: true });
            // Separamos por el formato SSE (data: ...)
            const lines = chunk.split('\n');
            
            lines.forEach(line => {
                if (line.startsWith('data:')) {
                    let cleanLine = line.replace('data:', '').trim();
                    
                    if (cleanLine.includes("[MANAGER ERROR]") || cleanLine.includes("[INFRA ERROR]")) {
                        terminalWrite(cleanLine, 'text-red-500 font-bold');
                    } else if (cleanLine) {
                        // Aquí sale el output real del ping (64 bytes from...)
                        terminalWrite(`  ${cleanLine}`, 'text-[#00ff88]');
                    }
                }
            });
        }
        terminalWrite("╔══════════════════════════════════════════════════════╗", 'text-emerald-500');
        terminalWrite("║ ESTATO: OPERACIÓN COMPLETADA CON ÉXITO               ║", 'text-emerald-500');
        terminalWrite("╚══════════════════════════════════════════════════════╝", 'text-emerald-500');
        
    } catch (err) {
        terminalWrite(`!! FALLO CRÍTICO EN EL SISTEMA: ${err.message}`, 'text-red-500 font-black');
    }
}

function initiateTacticalPing(targetIp) {
    // 1. VALIDACIÓN DE SEGURIDAD INMEDIATA
    // Si la IP no existe o es "N/A", abortamos la misión antes de contactar al servidor
    if (!targetIp || targetIp === "N/A" || targetIp === "undefined" || targetIp === "") {
        terminalWrite("!! ERROR DE PUNTERÍA: EL OBJETIVO NO TIENE UNA IP VÁLIDA", "text-red-500 font-black");
        logCombat("CRITICAL", "Misión abortada: Dirección de destino nula.");
        return; 
    }

    // 2. IDENTIFICACIÓN DE LA UNIDAD ATACANTE
    // Buscamos en el grafo el nodo que tiene el rol de atacante
    const attackerNode = cy.nodes('[role = "attacker"]')[0];
    
    if (!attackerNode) {
        terminalWrite("!! ERROR DE COMUNICACIÓN: NO SE DETECTA NODO ATACANTE", "text-red-500");
        logCombat("ERROR", "SECTOR BLOQUEADO: No hay unidad con privilegios de ataque en el HUD.");
        return;
    }

    const attackerName = attackerNode.data('name');
    const attackerIp = attackerNode.data('ip');

    // 3. IDENTIFICACIÓN DEL OBJETIVO EN EL GRAFO (Para el log visual)
    const targetNode = cy.nodes().filter(n => n.data('ip') === targetIp)[0];
    const targetName = targetNode ? targetNode.data('name') : "UNKNOWN_HOST";

    // 4. PREPARACIÓN DE LA TERMINAL TÁCTICA
    // Limpiamos el log para mostrar la nueva misión de forma clara
    // const log = document.getElementById("combat-log");
   //  log.innerHTML = ""; 
    
    terminalWrite(`╔══════════════════════════════════════════════════════╗`, 'text-sky-400');
    terminalWrite(`║ MISSION: TACTICAL NETWORK DIAGNOSTIC (PING)          ║`, 'text-sky-400');
    terminalWrite(`║ ORIGIN:  ${attackerName.padEnd(20)} [${attackerIp}] ║`, 'text-white font-bold');
    terminalWrite(`║ TARGET:  ${targetName.padEnd(20)} [${targetIp}]   ║`, 'text-yellow-400 font-bold');
    terminalWrite(`╚══════════════════════════════════════════════════════╝`, 'text-sky-400');
    
    // 5. EJECUCIÓN DEL ATAQUE
    // Enviamos los datos validados a la función que conecta con el backend
    logCombat("ACTION", `Iniciando túnel táctico hacia ${targetIp}`);
    runAttack(attackerIp, targetIp, 'ping_target.sh');
}

async function installIcmpDetector(targetIp) {
    if (!targetIp || targetIp === "N/A") {
        terminalWrite(
            "!! NO SE PUEDE INSTALAR DETECTOR: IP inválida",
            "text-red-500 font-black"
        );
        return;
    }

    // 🔍 localizar nodo monitor automáticamente
    const monitorNode = cy.nodes('[role = "monitor"]')[0];

    if (!monitorNode) {
        terminalWrite(
            "!! NO SE PUEDE INSTALAR DETECTOR: no hay nodo MONITOR",
            "text-red-500 font-black"
        );
        return;
    }

    const monitorIp = monitorNode.data('ip');

    if (!monitorIp || monitorIp === "N/A") {
        terminalWrite(
            "!! IP del MONITOR inválida",
            "text-red-500 font-black"
        );
        return;
    }

    terminalWrite(
        `[SETUP] Instalando detector ICMP en ${targetIp} → monitor ${monitorIp}`,
        "text-sky-400"
    );

    const url =
        `${API_BASE}/hud/victim/install_detector` +
        `?ip=${targetIp}` +
        `&monitor_ip=${monitorIp}` +
        `&script=ping_target_detecter.sh`;

    console.log("[DETECTOR][FRONT] URL =", url);

    try {
        const res = await fetch(url);

        if (!res.ok) {
            throw new Error(`HTTP ${res.status}`);
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
            const { value, done } = await reader.read();
            if (done) break;

            const chunk = decoder.decode(value, { stream: true });
            chunk.split('\n').forEach(line => {
                if (line.startsWith("data:")) {
                    terminalWrite(
                        line.replace("data:", "").trim(),
                        "text-[#00ff88]"
                    );
                }
            });
        }

        terminalWrite(
            "[OK] Detector ICMP activo en el nodo",
            "text-emerald-400"
        );
        markDetectorInstalled();

    } catch (err) {
        terminalWrite(
            `[ERROR] Fallo al instalar detector: ${err.message}`,
            "text-red-500"
        );
    }
}


let icmpDetectorInstalled = false;
function markDetectorInstalled() {
    icmpDetectorInstalled = true;
    logCombat("DETECTOR", "ICMP detector instalado en la víctima");
}



async function startMonitorListener(monitorIp) {
    terminalWrite(
        `[MONITOR] Starting ICMP listener on ${monitorIp}...`,
        "text-sky-400"
    );

    const url = `${API_BASE}/hud/monitor/start_listener?ip=${monitorIp}`;

    try {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const text = await res.text();
        terminalWrite(text.replace("data:", "").trim(), "text-emerald-400");

        logCombat("MONITOR", "ICMP listener started");

    } catch (err) {
        terminalWrite(
            `[ERROR] Cannot start listener: ${err.message}`,
            "text-red-500"
        );
    }
}

async function stopMonitorListener(monitorIp) {
    terminalWrite(
        `[MONITOR] Stopping ICMP listener on ${monitorIp}...`,
        "text-yellow-400"
    );

    const url = `${API_BASE}/hud/monitor/stop_listener?ip=${monitorIp}`;

    try {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const text = await res.text();
        terminalWrite(text.replace("data:", "").trim(), "text-emerald-400");

        logCombat("MONITOR", "ICMP listener stopped");

    } catch (err) {
        terminalWrite(
            `[ERROR] Cannot stop listener: ${err.message}`,
            "text-red-500"
        );
    }
}
