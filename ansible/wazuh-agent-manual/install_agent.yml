---
- name: Despliegue de Wazuh Agent Versión Fija
  hosts: victim
  become: true
  vars:
    manager_ip: "10.0.2.160"
    target_version: "4.7.3"
    agent_name: "Victim-3"

  tasks:
    - name: 1. Instalar dependencias para repositorios HTTPS
      apt:
        name: [curl, gnupg2, apt-transport-https]
        state: present
        update_cache: true

    - name: 2. Añadir clave GPG de Wazuh
      apt_key:
        url: https://packages.wazuh.com/key/GPG-KEY-WAZUH
        state: present

    - name: 3. Añadir repositorio oficial (v4.x)
      apt_repository:
        repo: "deb https://packages.wazuh.com/4.x/apt/ stable main"
        state: present
        filename: wazuh

    - name: 4. Instalar versión exacta ({{ target_version }})
      apt:
        name: "wazuh-agent={{ target_version }}-1"
        state: present
        force: yes # Permite sobreescribir si hay una versión superior (downgrade)
        update_cache: true

    - name: 5. Configurar IP del Manager en ossec.conf
      lineinfile:
        path: /var/ossec/etc/ossec.conf
        regexp: '<address>.*</address>'
        line: "      <address>{{ manager_ip }}</address>"

    - name: 6. Configurar nombre del agente en internal_options
      lineinfile:
        path: /var/ossec/etc/local_internal_options.conf
        line: "agent.name={{ agent_name }}"
        create: yes

    - name: 7. Iniciar y habilitar servicio
      systemd:
        name: wazuh-agent
        enabled: true
        state: restarted
        daemon_reload: true
