---
- name: Despliegue Inteligente de Wazuh Agent
  hosts: victim
  become: true
  vars:
    manager_ip: "10.0.2.160"
    manager_version: ""
    agent_name: "Victim-3"

  tasks:
    - name: 1. Instalar dependencias
      apt:
        name: [curl, gnupg2, apt-transport-https]
        state: present
        update_cache: true

    - name: 2. Añadir clave GPG oficial
      apt_key:
        url: https://packages.wazuh.com/key/GPG-KEY-WAZUH
        state: present

    - name: 3. Añadir repositorio oficial
      apt_repository:
        repo: "deb https://packages.wazuh.com/4.x/apt/ stable main"
        state: present

    - name: 4. Instalar versión específica del Agente (Coincidente con el Manager)
      apt:
        name: "wazuh-agent={{ manager_version }}-1"
        state: present
        update_cache: true
        force: yes # Por si hay que bajar de versión (downgrade)

    - name: 5. Configurar IP del Manager en ossec.conf
      lineinfile:
        path: /var/ossec/etc/ossec.conf
        regexp: '<address>.*</address>'
        line: "      <address>{{ manager_ip }}</address>"
      notify: Reiniciar Agente

    - name: 6. Configurar nombre personalizado
      lineinfile:
        path: /var/ossec/etc/local_internal_options.conf
        line: "agent.name={{ agent_name }}"
        create: yes
      notify: Reiniciar Agente

    - name: 7. Iniciar servicio
      systemd:
        name: wazuh-agent
        enabled: true
        state: started

  handlers:
    - name: Reiniciar Agente
      systemd:
        name: wazuh-agent
        state: restarted
